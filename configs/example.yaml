launcher:
  worker_startup_timeout_s: 10
  shutdown_timeout_s: 5

worker:
  endpoint: "tcp://127.0.0.1:5556"
  request_timeout_ms: 30000

mcp:
  host: "0.0.0.0"
  port: 8051
  path: "/mcp"

oas:
  url: "ws://127.0.0.1:8002"   # worker connects here; keep in sync with host/port
  host: "127.0.0.1"            # launcher binds the vendored OAS here
  port: 8002
  request_timeout_s: 5.0

bits:
  # Importable BITS package name. The launcher resolves <package>/startup.py from
  # it and spawns OAS against that file, so the exposed devices are exactly what
  # the package's startup.py loads into its oregistry. The package MUST be
  # installed in the environment you launch from (see the conda note in README) —
  # bait_mcp refuses to start otherwise. Override at launch with --bits-package.
  package: "mcp_instrument"
